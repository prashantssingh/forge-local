version: 1
enforcement: declarative-manual-v1

defaults:
  max_tasks: 3
  max_files_changed: 8
  require_human_approval: true
  branch_pattern: "agent/*"
  protected_branches:
    - main

tiers:
  tier_0:
    name: read-docs-only
    allows:
      - read tracked Markdown documentation
      - read assigned run artifacts
  tier_1:
    name: read-repository
    includes: tier_0
    allows:
      - read tracked repository files
      - inspect Git status, log, and diff
  tier_2:
    name: write-markdown
    includes: tier_1
    allows:
      - write approved Markdown documentation
      - write assigned run reports
  tier_3:
    name: modify-code-on-branch
    includes: tier_1
    allows:
      - modify approved files on a non-protected branch
    conditions:
      - approved plan exists
      - current branch matches branch_pattern
      - changed files remain within approved scope and limit
  tier_4:
    name: run-safe-commands
    includes: tier_1
    allows:
      - run explicitly approved project tests
      - run non-mutating lint, type, build, and configuration checks
      - inspect local service health
    conditions:
      - command is visible before execution
      - command has finite scope and duration
  tier_5:
    name: human-approval-only
    allows:
      - actions listed in human_approval_required

roles:
  orchestrator:
    default_tier: tier_2
    write_scope:
      - agents/runs/<run-id>/*.md
  planner:
    default_tier: tier_1
    write_scope: []
  builder:
    default_tier: tier_3
    command_tier_when_approved: tier_4
  tester:
    default_tier: tier_4
    write_scope:
      - agents/runs/<run-id>/test-report.md
      - agents/runs/<run-id>/run-status.md
  reviewer:
    default_tier: tier_1
    write_scope: []
  memory:
    default_tier: tier_2
    write_scope:
      - docs/ai-context.md
      - docs/ai-decisions.md
      - docs/ai-todo.md
      - docs/ai-log.md
      - agents/runs/<run-id>/memory-update.md
  researcher:
    default_tier: tier_1
    network_tier_when_approved: tier_5

blocked_commands:
  - "rm -rf"
  - sudo
  - "chmod -R"
  - "curl | sh"
  - "wget | sh"
  - "brew install"
  - "npm publish"
  - "git push --force"

blocked_actions:
  - delete databases or persistent volumes
  - edit ~/.ssh
  - edit ~/.zshrc or other shell startup files
  - access, display, transmit, or modify secrets
  - modify a protected branch directly
  - disable safety checks or approval gates

human_approval_required:
  - install or upgrade dependencies
  - access an external network
  - delete or rename files
  - run database migrations
  - modify authentication, authorization, or security logic
  - change deployment configuration
  - edit secrets or credential configuration
  - push to a remote
  - merge branches
  - exceed the task or changed-file limit
