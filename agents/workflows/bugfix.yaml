version: 1
id: bugfix
name: Bug Fix
enabled: true
mode: sequential
description: Reproduce a bug, identify evidence, and make the smallest verified fix.

limits:
  max_tasks: 1
  max_files_changed: 8
  repeated_failure_limit: 3

stages:
  - id: reproduce
    role: tester
    permission_tier: tier_4
    action: Reproduce the reported behavior with the narrowest safe command or manual steps.
    allowed_writes:
      - agents/runs/<run-id>/test-report.md
      - agents/runs/<run-id>/run-status.md
    report: test-report.md
    stop_if:
      - reproduction would mutate persistent data without approval
      - reproduction requires unapproved network access

  - id: diagnose-and-plan
    role: planner
    permission_tier: tier_1
    action: Use reproduction evidence and relevant code to identify the likely cause and smallest fix.
    allowed_writes: []
    recorded_by: orchestrator
    report: run-plan.md
    requirements:
      - include regression check
      - distinguish evidence from hypothesis

  - id: approve-fix
    role: human
    permission_tier: tier_5
    action: Approve the proposed fix, file scope, and regression check.
    approval:
      required: true
      record_in: run-plan.md
    stop_until_approved: true

  - id: implement-fix
    role: builder
    permission_tier: tier_3
    action: Implement the approved minimal fix on an agent branch.
    allowed_writes:
      - approved fix and regression-test files on agent branch
      - agents/runs/<run-id>/run-status.md
    stop_if:
      - current branch is main
      - STOPPED.md exists
      - evidence points to a materially different cause

  - id: regression-test
    role: tester
    permission_tier: tier_4
    action: Run the original reproduction, new regression check, and relevant existing checks.
    allowed_writes:
      - agents/runs/<run-id>/test-report.md
      - agents/runs/<run-id>/run-status.md
    report: test-report.md

  - id: review
    role: reviewer
    permission_tier: tier_1
    action: Review cause alignment, fix scope, regression coverage, and side effects.
    allowed_writes: []
    recorded_by: orchestrator
    report: review-report.md

  - id: update-memory
    role: memory
    permission_tier: tier_2
    action: Record verified cause, fix, checks, and remaining concerns.
    allowed_writes:
      - docs/ai-decisions.md
      - docs/ai-todo.md
      - docs/ai-log.md
      - agents/runs/<run-id>/memory-update.md
    report: memory-update.md

  - id: accept-result
    role: human
    permission_tier: tier_5
    action: Accept, revise, or reject the fix after reviewing evidence.
    approval:
      required: true

completion_reports:
  - run-plan.md
  - run-status.md
  - test-report.md
  - review-report.md
  - memory-update.md
  - run-summary.md
