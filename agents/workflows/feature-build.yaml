version: 1
id: feature-build
name: Feature Build
enabled: true
mode: sequential
description: Deliver a bounded feature as individually reviewed tasks.

limits:
  max_tasks_from_env: AGENT_MAX_TASKS
  default_max_tasks: 3
  max_files_changed_per_task_from_env: AGENT_MAX_FILES_CHANGED
  default_max_files_changed_per_task: 8
  repeated_failure_limit: 3

stages:
  - id: feature-plan
    role: planner
    permission_tier: tier_1
    action: Break the feature into ordered, independently testable tasks.
    allowed_writes: []
    recorded_by: orchestrator
    report: run-plan.md
    requirements:
      - define feature-level success criteria
      - define acceptance check for every task
      - keep task count within the configured maximum

  - id: approve-feature-plan
    role: human
    permission_tier: tier_5
    action: Approve task order, total scope, risks, and first task.
    approval:
      required: true
      record_in: run-plan.md
    stop_until_approved: true

  - id: task-loop
    repeat_for_each_approved_task: true
    max_iterations_from_env: AGENT_MAX_TASKS
    steps:
      - role: builder
        permission_tier: tier_3
        action: Implement only the current approved task on the agent branch.
        allowed_writes:
          - approved task files on agent branch
          - agents/runs/<run-id>/run-status.md
      - role: tester
        permission_tier: tier_4
        action: Run the current task's acceptance and regression checks.
        allowed_writes:
          - agents/runs/<run-id>/test-report.md
          - agents/runs/<run-id>/run-status.md
      - role: reviewer
        permission_tier: tier_1
        action: Review the cumulative diff and current-task alignment.
        allowed_writes: []
        recorded_by: orchestrator
        report: review-report.md
      - role: human
        permission_tier: tier_5
        action: Approve revision or continuation to the next task.
        approval:
          required_before_next_task: true
    stop_if:
      - STOPPED.md exists
      - task or file limit is reached
      - current branch is main
      - reviewer recommends reject
      - repeated failure limit is reached

  - id: update-memory
    role: memory
    permission_tier: tier_2
    action: Record verified feature outcome, decisions, and remaining tasks.
    allowed_writes:
      - docs/ai-context.md
      - docs/ai-decisions.md
      - docs/ai-todo.md
      - docs/ai-log.md
      - agents/runs/<run-id>/memory-update.md
    report: memory-update.md

  - id: final-human-review
    role: human
    permission_tier: tier_5
    action: Review the complete diff and reports before any merge or push.
    approval:
      required: true
      merge_and_push_separate: true

completion_reports:
  - run-plan.md
  - run-status.md
  - test-report.md
  - review-report.md
  - memory-update.md
  - run-summary.md
