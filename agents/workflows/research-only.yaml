version: 1
id: research-only
name: Research Only
enabled: true
mode: sequential
description: Answer one bounded question without code changes.

limits:
  max_questions: 1
  source_file_writes: 0
  prefer_primary_sources: true

stages:
  - id: frame-question
    role: planner
    permission_tier: tier_1
    action: Clarify the question, decision it supports, and evidence required.
    allowed_writes: []
    recorded_by: orchestrator
    report: run-plan.md

  - id: approve-network
    role: human
    permission_tier: tier_5
    action: Approve exact external destinations and private-data boundary when web access is needed.
    approval:
      required_if_network_needed: true
      record_in: run-plan.md
    stop_until_approved_if_network_needed: true

  - id: research
    role: researcher
    permission_tier: tier_1
    permission_tier_with_network_approval: tier_5
    action: Prefer official sources and return cited findings, inference, uncertainty, and recommendation.
    allowed_writes: []
    recorded_by: orchestrator
    stop_if:
      - network approval is absent
      - private repository data would leave the machine
      - question expands materially

  - id: record-findings
    role: orchestrator
    permission_tier: tier_2
    action: Save the concise research result in the run summary or approved docs location.
    allowed_writes:
      - agents/runs/<run-id>/run-status.md
      - agents/runs/<run-id>/run-summary.md
      - explicitly approved Markdown documentation

prohibited:
  - modifying code, tests, dependencies, or configuration
  - installing packages
  - copying substantial copyrighted content

completion_reports:
  - run-plan.md
  - run-status.md
  - run-summary.md
