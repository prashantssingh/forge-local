version: 1
id: review-only
name: Review Only
enabled: true
mode: sequential
description: Inspect an identified Git diff and produce a read-only review.

limits:
  max_tasks: 1
  source_file_writes: 0

stages:
  - id: identify-diff
    role: orchestrator
    permission_tier: tier_1
    action: Record the base, branch or commit, plan, and exact diff under review.
    allowed_writes:
      - agents/runs/<run-id>/run-status.md
    stop_if:
      - diff cannot be identified
      - STOPPED.md exists

  - id: review
    role: reviewer
    permission_tier: tier_1
    action: Review plan alignment, bugs, risk, security, unnecessary changes, and missing tests.
    allowed_writes: []
    recorded_by: orchestrator
    report: review-report.md

  - id: summarize
    role: orchestrator
    permission_tier: tier_2
    action: Record the review without changing the reviewed files.
    allowed_writes:
      - agents/runs/<run-id>/review-report.md
      - agents/runs/<run-id>/run-status.md
      - agents/runs/<run-id>/run-summary.md

prohibited:
  - modifying source, tests, or configuration
  - fixing findings in the same run
  - running mutating or destructive commands

completion_reports:
  - run-status.md
  - review-report.md
  - run-summary.md
