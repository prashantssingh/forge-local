name: forge-local-agentos

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: forge-local-open-webui
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WEBUI_PORT:-3000}:8080"
    environment:
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - open-webui-data:/app/backend/data

  # Qdrant is optional in the MVP. Start it with the `memory` profile.
  qdrant:
    image: qdrant/qdrant:latest
    container_name: forge-local-qdrant
    restart: unless-stopped
    profiles:
      - memory
    ports:
      - "127.0.0.1:${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  open-webui-data:
  qdrant-data:
